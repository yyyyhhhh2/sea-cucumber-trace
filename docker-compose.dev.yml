services:
  mysql:
    image: mysql:8.4
    container_name: seatrace-mysql-dev
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sea_cucumber_trace
      MYSQL_USER: seatrace
      MYSQL_PASSWORD: seatrace123
    ports:
      - "3306:3306"
    volumes:
      - seatrace_mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: seatrace-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - seatrace_redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  seatrace_mysql_dev_data:
  seatrace_redis_dev_data:
